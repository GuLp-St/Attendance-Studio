<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- FIX: Use /favicon.png so it works with any URL path/hash -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050505">
    <title>Attendance Studio</title>
  </head>
  <body style="background-color: #050505; color: #fff; margin: 0; padding: 0;">
    <style>
      .splash-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px); background-size: 20px 20px; display: flex; justify-content: center; align-items: center; z-index: 9999; }
      .splash-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; }
      .splash-icon { width: 100px; height: 100px; filter: drop-shadow(0 0 10px #00f3ff); border-radius: 50%; background: #050505; }
      .splash-title { position: absolute; top: 120px; color: #00f3ff; font-size: 1.5rem; text-align: center; line-height: 1.2; text-shadow: 0 0 10px rgba(0, 243, 255, 0.1); letter-spacing: 4px; font-weight: 300; font-family: 'Segoe UI', sans-serif; width: 300px; animation: fadeIn 1s ease 0.5s both; }
      .splash-loader { position: absolute; top: 200px; width: 40px; height: 40px; border: 2px solid transparent; border-top-color: #00f3ff; border-radius: 50%; animation: spin 1s linear infinite, fadeIn 1s ease 0.5s both; }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
    <div id="root">
      <div class="splash-container">
        <div class="splash-logo">
          <img src="/favicon.png" alt="App Logo" class="splash-icon" />
          <h1 class="splash-title">ATTENDANCE<br/>STUDIO</h1>
          <div class="splash-loader"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
